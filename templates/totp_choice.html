<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Up Authenticator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="dark bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm px-6">

    <div class="mb-8 text-center">
      <div class="text-4xl mb-2">✅</div>
      <h1 class="text-2xl font-bold tracking-tight">You're in!</h1>
      <p class="text-gray-400 text-sm mt-1">Identity verified via Telegram</p>
    </div>

    <div class="bg-gray-900 rounded-2xl p-6 shadow-xl border border-gray-800">

      <p class="text-sm text-gray-300 mb-5 text-center">
        Want to set up an authenticator app for faster logins next time?
      </p>

      <div class="space-y-3">
        <a href="/auth/setup-totp"
          class="block w-full bg-blue-600 hover:bg-blue-500 text-white font-medium
                 rounded-lg py-3 px-4 text-sm transition-colors text-center">
          📱 Set up now
        </a>

        <button onclick="skipSetup()"
          class="w-full bg-gray-800 hover:bg-gray-700 border border-gray-700
                 text-gray-300 font-medium rounded-lg py-3 px-4 text-sm transition-colors">
          Skip for now
        </button>
      </div>

      <p id="err" class="text-red-400 text-xs mt-3 hidden text-center"></p>

    </div>
  </div>

  <script>
    async function skipSetup() {
      const errEl = document.getElementById('err');
      errEl.classList.add('hidden');
      try {
        const res = await fetch('/auth/skip-totp', { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');
        window.location.href = data.redirect || '/alwayson/';
      } catch (e) {
        errEl.textContent = e.message;
        errEl.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
